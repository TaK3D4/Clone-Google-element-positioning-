<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>

    <link rel="stylesheet" href="/CSS/Styles.css">
</head>
<body>
    
    <header>
        <nav>
            <a href="" class="nav-link">Gmail</a>
            <a href="" class="nav-link">Imagenes</a>
            <a href="" class="nav-apps">
                <img src="google-clone-recursos/img/apps-icon.png" alt="" width="25">
            </a>
            <a href="" class="nav-login">Iniciar sesion</a>
        </nav>
    </header>
    
    <main>
        <section class="logo">
            <img src="/google-clone-recursos/img/logo-google.png" alt="Logo de Google" width="300">
        </section>
            <section class="buscador-bar">
                <form action="">
                    <label class="label-buscador">
                        <img src="/google-clone-recursos/img/search-icon.png" alt="Icono de buscar" width="25" class="icon-buscar">
                        <input type="text" name="buscar" id="buscar">
                        <a href="">
                            <img src="/google-clone-recursos/img/camera-icon.png" alt="Icono de camara" width="25">
                        </a>
                        <a href="">
                            <img src="/google-clone-recursos/img/mic-icon.png" alt="Icono de micro" width="25">
                        </a>
                    </label>
                </form>
            </section>

            <section class="botones">
                <button>Buscar con Google</button>
                <button>Voy a Tener Suerte</button>
                <p>
                    Ofecido por Google en:
                    <a href="">Español (Lationamerica)</a>
                    <a href="">Venezuela</a>
                </p>
            </section>

        
    </main>

    <footer>
        <div class="pais">
            Venezuela
        </div>
        <div class="links">
            <ul>
                <li><a href="">Sobre Google</a></li>
                <li><a href="">Publicidad</a></li>
                <li><a href="">Negocios</a></li>
                <li><a href="">Como funciona la busqueda</a></li>
            </ul>

            <ul>
                <li><a href="">Privacidad</a></li>
                <li><a href="">Condiciones</a></li>
                <li><a href="">Preferencias</a></li>
            </ul>
        </div>
    </footer>

    
</body>
</html>
